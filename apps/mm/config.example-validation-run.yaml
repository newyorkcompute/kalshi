# Market Maker Config — VALIDATION RUN
# Updated: 2026-07-11
#
# 2–3 week weather-only validation at tiny size. Goal: measure real expectancy
# with `npm run analyze` before scaling position limits.
#
# Relies on merged safety features:
# - Mark-to-market risk (drawdown + maxDailyLoss use realized + unrealized P&L)
# - Settlement sync (realizes P&L every 5 min)
# - Observation-aware same-day fair values (NWS refresh every 10 min)
# - Pre-settlement cutoff (no new positions in final 2 hours)
#
# Strategy: weather-informed threshold markets only (T-prefix; skip B-prefix ranges).

api:
  enabled: true
  port: 3001

kalshi:
  demo: false   # PRODUCTION — real money

# DISABLED general scanner — no edge on sports/politics/crypto
scanner:
  enabled: false

strategy:
  name: weather-informed
  weather-informed:
    minEdgeCents: 7           # Only trade with 7+ cents of edge (high confidence)
    maxPositionPerMarket: 5   # 5 contracts max per market
    sizePerEdgeCent: 1        # 1 contract per cent of edge
    maxOrderSize: 3           # 3 contracts max per order
    priceOffset: 2            # Place limit 2¢ inside fair value (margin of safety)
    refreshIntervalMin: 10    # Refresh NWS data every 10 min
    noNewPositionsFinalHours: 2  # Stop opening new positions 2h before settlement
    skipRangeBuckets: true    # SKIP B-prefix range bucket markets entirely

    # ─── CALIBRATED SIGMA (°F) ───
    # Slightly wider than before — be conservative, fewer but safer trades
    highSigma:
      hours0to6: 1.2          # Same-day: very accurate
      hours6to12: 1.5
      hours12to24: 2.0
      hours24to48: 2.5        # Next-day: slightly wider for safety
      hours48to72: 3.5
      hours72plus: 5.0        # 3+ day: don't trust the model much
    lowSigma:
      hours0to6: 1.5          # Lows are less predictable
      hours6to12: 1.8
      hours12to24: 2.2
      hours24to48: 3.0
      hours48to72: 4.0
      hours72plus: 5.5

# No static markets — weather scanner provides them
markets: []

# Risk limits — TIGHT (validation run)
risk:
  maxPositionPerMarket: 8     # Hard limit per market (above strategy cap)
  maxTotalExposure: 50        # 50 contracts total across all markets
  maxDailyLoss: 1500          # $15 max daily loss (mark-to-market)
  maxOrderSize: 3             # 3 per order max
  minSpread: 2
  drawdown:
    scaleDownStart: 500       # Start scaling down at $5 drawdown from peak
    halfSizeDrawdown: 1000    # 50% size at $10 drawdown
    haltDrawdown: 1500        # Halt at $15 drawdown from peak

daemon:
  staleOrderMs: 60000         # Cancel stale orders after 60s
  reconnectDelayMs: 5000
